<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Highway Traffic Simulator</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #46586b; }
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    #app { position: fixed; inset: 0; }
    .panel {
      position: fixed; color: #dbe4ee; background: rgba(10, 16, 14, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px;
      padding: 10px 14px; backdrop-filter: blur(6px);
      pointer-events: none; user-select: none;
    }
    .hud { left: 12px; top: 12px; font-size: 13px; line-height: 1.55; min-width: 190px; }
    .hud h1 { font-size: 14px; margin: 0 0 6px; font-weight: 600; letter-spacing: 0.02em; }
    .hud .row { display: flex; justify-content: space-between; gap: 18px; }
    .hud .row span:last-child { font-variant-numeric: tabular-nums; color: #fff; }
    .legend { left: 12px; bottom: 12px; }
    .legend .bar {
      height: 8px; width: 180px; border-radius: 4px;
      background: linear-gradient(to right, hsl(0 90% 50%), hsl(60 90% 50%), hsl(120 70% 45%));
    }
    .legend .labels { display: flex; justify-content: space-between; font-size: 11px; color: #9fb0c0; margin-top: 4px; }
    /* sits left of the control panel column (lil-gui: 245px wide, 15px inset),
       which otherwise paints over the hint's tail whenever it reaches the
       bottom of the window */
    .hint { right: 272px; bottom: 12px; font-size: 11px; color: #9fb0c0; }
    .map-label {
      color: #dbe4ee; background: rgba(10, 16, 14, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 6px;
      padding: 1px 7px; font-size: 11px; white-space: nowrap;
      pointer-events: none; user-select: none;
    }
    .map-label.on { border-left: 3px solid #7ec8a0; }
    .map-label.off { border-left: 3px solid #d9b64a; }
    .map-label.hover { border-left: 3px solid #3987e5; }
    .charts { left: 12px; bottom: 76px; width: 320px; padding: 8px 10px 10px; }
    .charts canvas { display: block; width: 320px; height: 56px; pointer-events: auto; }
    .charts canvas.diagram, .charts canvas.fund { height: 120px; }
    .charts canvas.diagram { cursor: crosshair; } /* click-through: flies the camera to that spot */
    .charts .chart + .chart { margin-top: 6px; }
    .charts .chead { display: flex; justify-content: space-between; font-size: 11px; color: #9fb0c0; margin-bottom: 2px; }
    .charts .chead.tall { min-height: 27px; align-items: flex-start; } /* two lines: a wrapping hover readout must not resize the panel */
    .charts .chead i { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 6px; }
    .charts .chead .cval { color: #fff; font-variant-numeric: tabular-nums; }
    .map-label .sub { font-size: 10px; color: #9fb0c0; font-variant-numeric: tabular-nums; }
    .speedo { left: 50%; bottom: 12px; transform: translateX(-50%); padding: 6px 12px 8px; text-align: center; }
    .speedo canvas { display: block; width: 180px; height: 110px; }
    .speedo .cap { font-size: 11px; color: #9fb0c0; }
    /* touch chase toggle: hidden on desktop (the C key and panel button
       cover it); shown by the phone breakpoint below */
    .chasebtn {
      display: none; font: inherit; font-size: 13px; color: #dbe4ee;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      pointer-events: auto; touch-action: manipulation;
    }
    /* phones, either orientation (matches SMALL in params.js): keyboard
       tips are dead weight without a keyboard, and a finger needs a chase
       toggle */
    @media (max-width: 500px), (max-height: 500px) {
      .hint { display: none; }
      .chasebtn { display: block; }
      .speedo canvas { width: 150px; height: 92px; } /* clears the chase button */
    }
    /* narrow screens: compact HUD (it must coexist with the 245 px control
       panel), and the chart stack squeezes to the viewport if re-enabled
       (canvas hover math is fraction-based, so scaling is safe) */
    @media (max-width: 760px) {
      .hud { font-size: 11px; line-height: 1.45; min-width: 0; max-width: 46vw; padding: 6px 10px; }
      .hud h1 { font-size: 11px; margin: 0 0 4px; }
      .hud .row { gap: 10px; }
      .legend .bar { width: 130px; }
      .charts { width: min(320px, calc(100vw - 44px)); padding: 8px 8px; }
      .charts canvas { width: 100%; }
    }
    /* notched phones: keep fixed panels out of the sensor/home-bar areas */
    .hud { left: max(12px, env(safe-area-inset-left)); top: max(12px, env(safe-area-inset-top)); }
    .legend { left: max(12px, env(safe-area-inset-left)); bottom: max(12px, env(safe-area-inset-bottom)); }
    .charts { left: max(12px, env(safe-area-inset-left)); }
    .speedo { bottom: max(12px, env(safe-area-inset-bottom)); }
    .hint { bottom: max(12px, env(safe-area-inset-bottom)); }
    /* lil-gui's own fixed inset (top 0, right 15px) ignores the cutout; on
       non-notched screens env() is 0 and these collapse to its defaults */
    .lil-gui.autoPlace {
      top: max(0px, env(safe-area-inset-top));
      right: max(15px, env(safe-area-inset-right));
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="panel hud">
    <h1>Highway Traffic Simulator</h1>
    <div class="row"><span>Cars on road</span><span id="stat-cars">–</span></div>
    <div class="row"><span>Average speed</span><span id="stat-speed">–</span></div>
    <div class="row"><span>Flow past start</span><span id="stat-flow">–</span></div>
    <div class="row"><span>Entered / exited</span><span id="stat-inout">–</span></div>
    <div class="row"><span>Sim time</span><span id="stat-time">–</span></div>
    <div class="row" id="row-fps" style="display: none"><span>FPS</span><span id="stat-fps">–</span></div>
  </div>

  <div class="panel legend" id="legend">
    <div class="bar"></div>
    <div class="labels"><span>stopped</span><span>desired speed</span></div>
  </div>

  <div class="panel hint" id="hint">hover a car: speed &nbsp;·&nbsp; click a car: crash it &nbsp;·&nbsp; drag orbit &nbsp;·&nbsp; scroll zoom &nbsp;·&nbsp; space pause &nbsp;·&nbsp; c chase &nbsp;·&nbsp; v views &nbsp;·&nbsp; f fps</div>

  <button class="panel chasebtn" id="chase-btn">🎥 Chase</button>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
        "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/+esm"
      }
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
